<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="white"/>
  
  <!-- Shield shape -->
  <g filter="url(#shadow)">
    <path d="M 256 64 L 416 128 L 416 288 Q 416 384 256 448 Q 96 384 96 288 L 96 128 Z" 
          fill="url(#shieldGradient)"/>
    
    <!-- Highlight for 3D effect -->
    <path d="M 256 64 L 416 128 L 416 288 Q 416 384 256 448 Q 96 384 96 288 L 96 128 Z" 
          fill="url(#highlightGradient)"/>
  </g>
  
  <!-- Network nodes -->
  <g>
    <!-- Central node -->
    <circle cx="256" cy="240" r="16" fill="#22D3EE"/>
    <circle cx="256" cy="240" r="20" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.5"/>
    
    <!-- Top nodes -->
    <circle cx="192" cy="192" r="12" fill="#A78BFA"/>
    <circle cx="320" cy="192" r="12" fill="#A78BFA"/>
    
    <!-- Bottom nodes -->
    <circle cx="176" cy="304" r="12" fill="#A78BFA"/>
    <circle cx="336" cy="304" r="12" fill="#A78BFA"/>
    <circle cx="256" cy="336" r="12" fill="#22D3EE"/>
    
    <!-- Connection lines -->
    <line x1="256" y1="240" x2="192" y2="192" stroke="#22D3EE" stroke-width="3" opacity="0.8"/>
    <line x1="256" y1="240" x2="320" y2="192" stroke="#22D3EE" stroke-width="3" opacity="0.8"/>
    <line x1="192" y1="192" x2="176" y2="304" stroke="#A78BFA" stroke-width="3" opacity="0.8"/>
    <line x1="320" y1="192" x2="336" y2="304" stroke="#A78BFA" stroke-width="3" opacity="0.8"/>
    <line x1="176" y1="304" x2="256" y2="336" stroke="#A78BFA" stroke-width="3" opacity="0.8"/>
    <line x1="336" y1="304" x2="256" y2="336" stroke="#A78BFA" stroke-width="3" opacity="0.8"/>
  </g>
  
  <!-- Subtle cloud element -->
  <g opacity="0.6">
    <path d="M 176 160 Q 176 140 196 140 Q 196 120 220 120 Q 230 108 256 108 Q 282 108 292 120 Q 316 120 316 140 Q 336 140 336 160 Q 336 180 316 180 L 196 180 Q 176 180 176 160 Z" 
          fill="#06B6D4" opacity="0.3"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Shield Icon -->
  <g transform="translate(20, 10)">
    <!-- Shield outline -->
    <path d="M 50 10 L 90 25 L 90 60 Q 90 85 50 100 Q 10 85 10 60 L 10 25 Z" 
          fill="url(#shieldGradient)" 
          stroke="#312E81" 
          stroke-width="2"/>
    
    <!-- Circuit/network pattern inside shield -->
    <circle cx="50" cy="45" r="4" fill="#06B6D4" opacity="0.9"/>
    <circle cx="35" cy="55" r="3" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="65" cy="55" r="3" fill="#8B5CF6" opacity="0.8"/>
    <circle cx="50" cy="65" r="3" fill="#06B6D4" opacity="0.9"/>
    
    <!-- Connection lines -->
    <line x1="50" y1="45" x2="35" y2="55" stroke="#06B6D4" stroke-width="1.5" opacity="0.7"/>
    <line x1="50" y1="45" x2="65" y2="55" stroke="#06B6D4" stroke-width="1.5" opacity="0.7"/>
    <line x1="35" y1="55" x2="50" y2="65" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <line x1="65" y1="55" x2="50" y2="65" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Cloud element overlay -->
    <path d="M 30 35 Q 30 28 37 28 Q 37 22 45 22 Q 48 18 55 18 Q 62 18 65 22 Q 73 22 73 28 Q 80 28 80 35 Q 80 42 73 42 L 37 42 Q 30 42 30 35 Z" 
          fill="url(#cloudGradient)" 
          opacity="0.6"/>
  </g>
  
  <!-- Text: AEGIS -->
  <text x="130" y="55" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#1E1B4B">
    AEGIS
  </text>
  
  <!-- Text: CLOUD -->
  <text x="130" y="90" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#4F46E5" letter-spacing="8">
    CLOUD
  </text>
  
  <!-- Tagline -->
  <text x="280" y="90" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6B7280">
    AI Endpoint Management
  </text>
</svg>

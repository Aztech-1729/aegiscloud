<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="shieldGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGradientDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="400" height="120" fill="#0F172A"/>
  
  <!-- Shield Icon with glow -->
  <g transform="translate(20, 10)" filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M 50 10 L 90 25 L 90 60 Q 90 85 50 100 Q 10 85 10 60 L 10 25 Z" 
          fill="url(#shieldGradientDark)" 
          stroke="#818CF8" 
          stroke-width="2"/>
    
    <!-- Circuit/network pattern inside shield -->
    <circle cx="50" cy="45" r="4" fill="#22D3EE"/>
    <circle cx="35" cy="55" r="3" fill="#A78BFA"/>
    <circle cx="65" cy="55" r="3" fill="#A78BFA"/>
    <circle cx="50" cy="65" r="3" fill="#22D3EE"/>
    
    <!-- Connection lines -->
    <line x1="50" y1="45" x2="35" y2="55" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="50" y1="45" x2="65" y2="55" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="35" y1="55" x2="50" y2="65" stroke="#A78BFA" stroke-width="1.5"/>
    <line x1="65" y1="55" x2="50" y2="65" stroke="#A78BFA" stroke-width="1.5"/>
    
    <!-- Cloud element overlay -->
    <path d="M 30 35 Q 30 28 37 28 Q 37 22 45 22 Q 48 18 55 18 Q 62 18 65 22 Q 73 22 73 28 Q 80 28 80 35 Q 80 42 73 42 L 37 42 Q 30 42 30 35 Z" 
          fill="url(#cloudGradientDark)" 
          opacity="0.7"/>
  </g>
  
  <!-- Text: AEGIS (white) -->
  <text x="130" y="55" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">
    AEGIS
  </text>
  
  <!-- Text: CLOUD (light indigo) -->
  <text x="130" y="90" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#A5B4FC" letter-spacing="8">
    CLOUD
  </text>
  
  <!-- Tagline -->
  <text x="280" y="90" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#94A3B8">
    AI Endpoint Management
  </text>
</svg>

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # BACKEND - Python/FastAPI
  # ============================================
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis_secret_2024
          POSTGRES_DB: aegis_cloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run linting
        run: |
          cd backend
          pip install ruff mypy
          ruff check app/
          mypy app/ --ignore-missing-imports

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://aegis:aegis_secret_2024@localhost:5432/aegis_cloud_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ============================================
  # AGENT - Rust
  # ============================================
  agent:
    name: Agent Tests (Rust)
    runs-on: windows-latest  # Agent is Windows-specific

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            agent/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('agent/Cargo.lock') }}

      - name: Check formatting
        run: |
          cd agent
          cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cd agent
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Run security audit
        run: |
          cd agent
          cargo install cargo-audit
          cargo audit

      - name: Run tests
        run: |
          cd agent
          cargo test --verbose -- --nocapture

      - name: Build release
        run: |
          cd agent
          cargo build --release

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: aegis-agent-windows-x64
          path: agent/target/release/aegis-agent.exe
          retention-days: 7

  # ============================================
  # FRONTEND - Next.js
  # ============================================
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --passWithNoTests

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Run E2E tests
        uses: playwright-community/playwright-github-action@v1
        with:
          working-directory: frontend
          run-tests: true

  # ============================================
  # INTEGRATION TESTS
  # ============================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend, agent, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 30  # Wait for services to be ready

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.test.yml exec -T backend pytest tests/integration/

      - name: Run chaos tests
        run: |
          cd tests/chaos
          python chaos_runner.py --duration=300

      - name: Collect logs
        if: always()
        run: |
          docker compose logs > docker-logs.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ============================================
  # SECURITY SCAN
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend, agent]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend.sarif'

      - name: Run Trivy vulnerability scanner (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'backend-security'

      - name: Run Bandit security scanner (Python)
        run: |
          pip install bandit
          bandit -r backend/app/ -f json -o bandit-report.json

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ============================================
  # BUILD DOCKER IMAGES
  # ============================================
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend, integration]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            aegiscloud/backend:latest
            aegiscloud/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            aegiscloud/frontend:latest
            aegiscloud/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # DEPLOY TO STAGING
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: kubectl apply, AWS ECS, etc.

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Add smoke test commands here

  # ============================================
  # RELEASE (manual trigger)
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download agent binary
        uses: actions/download-artifact@v4
        with:
          name: aegis-agent-windows-x64
          path: ./release

      - name: Sign Windows binary
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
        run: |
          echo "Signing Windows binary..."
          # Add code signing commands here
          # signtool sign /f cert.pfx /p $WINDOWS_CERT_PASSWORD ./release/aegis-agent.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release/aegis-agent.exe
          body: |
            ## Aegis Cloud Agent ${{ github.ref_name }}
            
            ### Installation
            ```powershell
            irm https://install.aegiscloud.io | iex
            ```
            
            ### Changelog
            See [CHANGELOG.md](./CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

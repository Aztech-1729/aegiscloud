version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_secret_2024
      POSTGRES_DB: aegis_cloud_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://aegis:aegis_secret_2024@postgres-test:5432/aegis_cloud_test
      REDIS_URL: redis://redis-test:6379/0
      SECRET_KEY: test-secret-key-for-testing
      TESTING: "true"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: pytest tests/ -v --cov=app --cov-report=term-missing

  load-tester:
    image: locustio/locust:latest
    volumes:
      - ./tests/load:/mnt/locust
    ports:
      - "8089:8089"
    depends_on:
      - backend-test
    command: locust -f /mnt/locust/locustfile.py --host=http://backend-test:8000

  chaos-monkey:
    build:
      context: ./tests/chaos
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend-test:8000
      REDIS_URL: redis://redis-test:6379/0
      POSTGRES_URL: postgresql://aegis:aegis_secret_2024@postgres-test:5432/aegis_cloud_test
    depends_on:
      - backend-test
      - redis-test
      - postgres-test
    volumes:
      - ./tests/chaos:/app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # HTTP collector
      - "6831:6831/udp"  # UDP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  grafana-data:
  prometheus-data:
